name: Release

# Phase 1 — initiate a release manually. Trigger from a branch via
# "Run workflow" with the version. It validates the inputs, creates the
# release tag at the branch head, and dispatches the Build workflow against
# the new tag ref so the attestation carries a `@refs/tags/*` identity
# (tags pushed with GITHUB_TOKEN do not trigger tag-push workflows).

run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.1.0)'
        required: true
        type: string

concurrency:
  group: platform-endorsements-release-${{ inputs.version }}

jobs:
  tag-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the release tag
      actions: write    # dispatch build.yml on the new tag

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - name: Validate machines and policies
      run: python3 scripts/validate.py

    - name: Check version format and tag availability
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "::error::Version must look like v0.1.0, got $VERSION"
          exit 1
        fi
        if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
          echo "::error::Tag $VERSION already exists"
          exit 1
        fi

    - name: Create and push the release tag
      env:
        VERSION: ${{ inputs.version }}
      run: |
        git tag "$VERSION"
        git push origin "refs/tags/$VERSION"

    - name: Dispatch the build workflow on the new tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        VERSION: ${{ inputs.version }}
      run: |
        gh workflow run build.yml --ref "$VERSION"
