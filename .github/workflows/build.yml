name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Reuses the tag's commit if it exists, otherwise tags the current branch head."
        required: true

permissions:
  id-token: write
  attestations: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      with:
        fetch-depth: 0  # tags needed for manual re-releases

    - name: Resolve release tag
      id: tag
      env:
        EVENT_NAME: ${{ github.event_name }}
        INPUT_TAG: ${{ github.event.inputs.tag }}
      run: |
        if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          TAG="$INPUT_TAG"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git checkout "refs/tags/$TAG"
          fi
        else
          TAG="$GITHUB_REF_NAME"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Validate machines and policies
      run: python3 scripts/validate.py

    - run: ./scripts/fetch-tdx-measure.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - run: ./scripts/fetch-ovmf.sh
    - run: ./scripts/measure.sh
    - run: ./scripts/build-endorsements.sh

    - name: Hash platform endorsements
      shell: bash
      id: hash
      run: |
        echo stdout=sha256:$(sudo sha256sum platform-endorsements.json | cut -d ' ' -f 1 | sudo tee tinfoil.hash) >> $GITHUB_OUTPUT

    - name: Attest platform endorsements
      uses: actions/attest@67422f5511b7ff725f4dbd6fb9bd2cd925c65a8d  # v1.4.1
      id: attest
      with:
        subject-name: platform-endorsements.json
        subject-digest: ${{ steps.hash.outputs.stdout }}
        predicate-type: https://tinfoil.sh/predicate/platform-endorsements/v1
        predicate-path: platform-endorsements.json

    - name: Create release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        files: |
          platform-endorsements.json
          tinfoil.hash

    # Ask the legacy hardware-measurements repo to republish its v1 artifact
    # (the .measurements section of this release) under its own signing
    # identity, so legacy verifiers stay in sync during their support window.
    # Requires a REPUBLISH_PAT secret with repo scope on the legacy repo;
    # skipped when the secret is not configured (manual republish instead).
    - name: Trigger legacy v1 republish
      env:
        REPUBLISH_PAT: ${{ secrets.REPUBLISH_PAT }}
      if: ${{ env.REPUBLISH_PAT != '' }}
      run: |
        curl -sS -X POST \
          -H "Authorization: token ${REPUBLISH_PAT}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/tinfoilsh/hardware-measurements/dispatches \
          -d "{\"event_type\": \"republish\", \"client_payload\": {\"tag\": \"${{ steps.tag.outputs.tag }}\"}}"
